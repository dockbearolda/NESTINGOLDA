      <nav class="menu" aria-label="Modules">
        <button class="menu-link" type="button" data-view="tasks"><span class="menu-icon">☑</span>Tâches</button>
        <button class="menu-link is-active menu-link-danger" type="button" data-view="testPlanning"><span class="menu-icon">📋</span>Commandes générales</button>
        <button class="menu-link" type="button" data-view="dtfMockups"><span class="menu-icon">🎨</span>Maquette à faire</button>

        <button class="menu-link" type="button" data-view="production"><span class="menu-icon">⚙</span>Production</button>
        <button class="menu-link" type="button" data-view="clients"><span class="menu-icon">👥</span>Clients Pro</button>
        <button class="menu-link" type="button" data-view="workshop"><span class="menu-icon">🔧</span>Gestion d'atelier</button>
        <button class="menu-link" type="button" data-view="purchase"><span class="menu-icon">🛒</span>Achat</button>
        <button class="menu-link" type="button" data-view="textile"><span class="menu-icon">👕</span>Achat Textile</button>
        <button class="menu-link" type="button" data-view="improvements"><span class="menu-icon">💡</span>Améliorations</button>
        <button class="menu-link" type="button" data-view="newOnglet"><span class="menu-icon">📌</span>New onglet</button>
      </nav>

    </aside>

    <main class="workspace">
      <header class="topbar">
        <div class="topbar-copy">
          <p class="eyebrow" id="pageEyebrow">Tableau de bord</p>
          <h2 id="pageTitle">Commandes générales</h2>
          <p id="pageIntro"></p>
        </div>

        <div class="topbar-actions">
          <label class="search" aria-label="Recherche globale du module">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input
              id="globalSearch"
              name="search"
              type="search"
              placeholder="Rechercher..."
              autocomplete="off"
            >
          </label>
          <button class="button button-primary" type="button" id="primaryActionButton">+ Ajouter</button>
        </div>
      </header>

      <section class="status-strip" id="statusStrip" aria-label="Indicateurs du module"></section>
      <section class="content-shell" id="viewRoot" aria-live="polite"></section>
    </main>
  </div>

  <dialog class="sheet-dialog" id="sheetDialog">
    <form class="sheet-form" id="sheetForm" method="dialog">
      <header class="sheet-head">
        <div>
          <p class="eyebrow" id="sheetEyebrow">Création</p>
          <h3 id="sheetTitle">Nouveau</h3>
        </div>
        <button class="icon-button" type="button" id="closeSheetButton" aria-label="Fermer">×</button>
      </header>
      <div id="sheetBody"></div>
      <footer class="sheet-actions">
        <button class="button" type="button" id="cancelSheetButton">Annuler</button>
        <button class="button button-primary" type="submit" id="submitSheetButton">Enregistrer</button>
      </footer>
    </form>
  </dialog>

  <div class="toast" id="toast" hidden></div>

  <script defer src="./app.bundle.js"></script>
